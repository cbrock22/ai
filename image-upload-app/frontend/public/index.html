<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, user-scalable=yes, viewport-fit=cover" />
    <meta name="theme-color" content="#1c1c1a" />
    <meta name="description" content="Upload and view images with automatic compression" />

    <!-- App font: Manrope (modern geometric sans) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" />

    <!-- Warm up the S3 image origin so the first thumbnail doesn't pay for a cold
         DNS + TLS handshake. crossorigin matches how <img> fetches the renditions;
         dns-prefetch is the fallback for browsers that ignore preconnect. -->
    <link rel="preconnect" href="https://image-storage-app-2025.s3.us-east-2.amazonaws.com" crossorigin />
    <link rel="dns-prefetch" href="https://image-storage-app-2025.s3.us-east-2.amazonaws.com" />

    <!-- iOS Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Image Upload" />

    <!-- Disable auto-detection of phone numbers -->
    <meta name="format-detection" content="telephone=no" />

    <!-- Prevent iOS from scaling text -->
    <meta name="text-size-adjust" content="100%" />

    <title>opticoles pics</title>

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="%PUBLIC_URL%/favicon.svg" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/favicon.svg" />

    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Speculation Rules API (Chrome/Edge, 2026): prerender same-origin pages the
         user is most likely to open next. 'moderate' eagerness fires on hover /
         pointer-down, so the actual click lands on an already-rendered page — a
         large LCP win on hard navigations (bookmarks, address bar, pre-hydration
         taps). Cross-origin links (fonts, S3 images) don't match "/*", the API is
         excluded, and any link tagged .no-prerender is skipped. Browsers without
         support simply ignore this block, so it degrades gracefully. -->
    <script type="speculationrules">
      {
        "prerender": [
          {
            "where": {
              "and": [
                { "href_matches": "/*" },
                { "not": { "href_matches": "/api/*" } },
                { "not": { "selector_matches": ".no-prerender" } }
              ]
            },
            "eagerness": "moderate"
          }
        ]
      }
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
